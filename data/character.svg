<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    .hair { fill: #3d2b1f; }
    .skin { fill: #f5cba7; }
    .shirt { fill: #6c5ce7; }
    .eye { fill: #2d3436; }
    .mouth { fill: #e17055; }
    .blush { fill: #f0b27a; opacity: 0.4; }
  </style>

  <!-- Hair (back) -->
  <ellipse class="hair" cx="32" cy="22" rx="15" ry="14"/>

  <!-- Head -->
  <circle class="skin" cx="32" cy="24" r="12"/>

  <!-- Hair (front bangs) -->
  <path class="hair" d="M20 22 Q22 8 32 8 Q42 8 44 22 L42 18 Q38 12 32 12 Q26 12 22 18 Z"/>
  <path class="hair" d="M20 20 Q22 10 28 10 L28 22 Z"/>
  <path class="hair" d="M44 20 Q42 10 36 10 L36 22 Z"/>
  <path class="hair" d="M32 8 Q30 6 28 8 Q30 10 32 10 Q34 10 36 8 Q34 6 32 8Z"/>

  <!-- Eyebrows -->
  <path d="M24 19 Q26 17 28 19" stroke="#3d2b1f" stroke-width="1" fill="none"/>
  <path d="M36 19 Q38 17 40 19" stroke="#3d2b1f" stroke-width="1" fill="none"/>

  <!-- Eyes -->
  <circle class="eye" cx="27" cy="23" r="2.5"/>
  <circle class="eye" cx="37" cy="23" r="2.5"/>
  <!-- Eye shine -->
  <circle fill="white" cx="28" cy="22" r="1"/>
  <circle fill="white" cx="38" cy="22" r="1"/>

  <!-- Blush -->
  <ellipse class="blush" cx="23" cy="28" rx="3" ry="1.5"/>
  <ellipse class="blush" cx="41" cy="28" rx="3" ry="1.5"/>

  <!-- Nose -->
  <path d="M32 25 L31 28 L33 28 Z" fill="none" stroke="#d4a574" stroke-width="0.8"/>

  <!-- Smile -->
  <path class="mouth" d="M27 30 Q32 35 37 30" stroke="none" fill="none"/>
  <path d="M27 30 Q32 35 37 30" stroke="#e17055" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="29" y="35" width="6" height="4" rx="2" class="skin"/>

  <!-- Shoulders / Shirt -->
  <path class="shirt" d="M18 48 Q20 38 26 38 L28 48 L22 55 L14 52 Z"/>
  <path class="shirt" d="M46 48 Q44 38 38 38 L36 48 L42 55 L50 52 Z"/>
  <path class="shirt" d="M22 48 L28 48 L32 55 L36 48 L42 48 L46 52 L40 55 L32 58 L24 55 L18 52 Z"/>
</svg>
